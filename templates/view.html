<!DOCTYPE html>
<html>

<head>

<title>View Records</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Stored Records</h1>

<table>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>

</tr>

{% for row in data %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">

<button>

Back

</button>

</a>

</div>

</body>

</html>
